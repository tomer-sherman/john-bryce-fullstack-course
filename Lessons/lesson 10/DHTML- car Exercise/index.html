<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="main.js"></script>
    <link rel="stylesheet" href="style.css">
</head>

<body onload="loadAndDisplayCars()">

    <form onsubmit="sendCar()" method="dialog" id="carForm">

        <Label>Select a car type:</Label>
        <select id="carTypeBox" required>
            <option value="" disabled selected>Select Type</option>
            <option>Private</option>
            <option>Bike</option>
            <option>Boat</option>
            <option>Truck</option>
        </select>
        <br><br>

        <label>Manufacture:</label>
        <input type="text" id="manufactureBox" required>
        <br><br>

        <label>Price:</label>
        <input type="number" id="priceBox" required>
        <br>
        <button>Add</button>
        <button onclick="clearForm()">Clear Form</button>
        <button onclick="clearAllStorage()">Clear All Storage</button>
        

    </form>

    <hr>

    <table>
        <thead>
            <tr>
                <th>Car type</th>
                <th>Manufacture</th>
                <th>Price</th>
            </tr>
        </thead>

        <tbody id="tableBody">

        </tbody>


    </table>

</body>

</html>
