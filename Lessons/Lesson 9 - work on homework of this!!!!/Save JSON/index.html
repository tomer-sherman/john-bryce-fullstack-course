<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Form</title>
    <script src="main.js" defer></script>
</head>

<body>
    <h2>Customer Details: </h2>

    <form onsubmit="save()">
        <label >First name:</label>
        <input type="text" id="firstNameBox" required>
        <br><br>

        <label>Address:</label>
        <textarea id="addressBox"></textarea>
        <br><br>

        <label>Email:</label>
        <input type="email" id="emailBox" />
        <br><br>
    </form>

    <button>Send</button>
</body>

</html>
