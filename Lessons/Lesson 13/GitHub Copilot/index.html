<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- A ui for a pie diagram -->
    <div id="pie-chart"></div>
    <!-- Create a form for the user to input the values for the pie chart -->
    <form id="pie-form">
        <label for="red">Red:</label>
        <input type="number" id="red" name="red" min="0" max="100" value="25">
        <br>
        <label for="green">Green:</label>
        <input type="number" id="green" name="green" min="0" max="100" value="25">
        <br>
        <label for="blue">Blue:</label>
        <input type="number" id="blue" name="blue" min="0" max="100" value="25">
        <br>
        <label for="yellow">Yellow:</label>
        <input type="number" id="yellow" name="yellow" min="0" max="100" value="25">
        <br>
        <button type="submit">Update Pie Chart</button>
    </form>
    <div id="percentages-display"></div>

    <script src="main.js" defer></script>
</body>
</html>
