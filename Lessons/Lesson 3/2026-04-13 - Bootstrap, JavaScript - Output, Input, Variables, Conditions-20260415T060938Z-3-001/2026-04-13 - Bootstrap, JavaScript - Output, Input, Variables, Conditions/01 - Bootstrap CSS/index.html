<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bootstrap CSS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <button class="btn btn-success">Button</button>
    <button class="btn btn-primary btn-sm">Button</button>
    <button class="btn btn-danger btn-lg">Button</button>

    <table class="table table-striped table-dark table-hover pricing-table">
        <thead>
            <tr>
                <th>Animal</th>
                <th>Price</th>
                <th>Image</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>Kitten</td>
                <td>$10.00</td>
                <td>
                    <img src="images/kitten.jpg" alt="Kitten" class="rounded-circle">
                </td>
            </tr>
            <tr>
                <td>Puppy</td>
                <td>$20.00</td>
                <td>
                    <img src="images/puppy.jpg" alt="Puppy" class="rounded-circle">
                </td>
            </tr>
            <tr>
                <td>Bunny</td>
                <td>$15.00</td>
                <td>
                    <img src="images/bunny.jpg" alt="Bunny" class="rounded-circle">
                </td>
            </tr>
            <tr>
                <td>Fish</td>
                <td>$5.00</td>
                <td>
                    <img src="images/fish.jpg" alt="Fish" class="rounded-circle">
                </td>
            </tr>
        </tbody>
    </table>

    <form>

        <label class="form-label">First name: </label>
        <input type="text" class="form-control" />
        <br><br>

        <label class="form-label">Last name: </label>
        <input type="text" class="form-control" />
        <br><br>

        <button>Send</button>

    </form>

</body>
</html>
